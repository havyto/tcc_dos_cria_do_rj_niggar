<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Gamer - Cadastro de Jogos</title>
    <link rel="stylesheet" href="../ASSETS/CSS/cadastroCliente.css">
</head>
<body>
    <button id="menu-btn">☰</button>

    <nav id="menu" class="menu">
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="biblioteca.html">Biblioteca</a></li>
            <li><a href="categoria.html">Categoria</a></li>
            <li><a href="loginCliente.html">Login</a></li>
            <li><a href="cadastroCliente.html">Cadastro</a></li>
            <li><a href="suporte.html">Suporte</a></li>        </ul>
    </nav>

    <div class="container">
        <div class="logo-container">
            <img src="../ASSETS/IMG/logo.png.png" alt="Ghost Gamer" class="logo-img">
            <span class="logo-text"><a href="../index.html">GHOST GAMER</a></span>
        </div>

        <!-- Apenas Cadastro Form - Centralizado -->
        <div class="cadastro-wrapper">
            <div class="form-box cadastro-box">
                <h2>CADASTRO</h2>
                <form method="post" action="../XAMP/cadastroJogo.php">
                    <div class="input-group">
                        <label>Nome do Jogo</label>
                        <input type="text" name="titulo" placeholder="Digite seu nome completo" required>
                    </div>
                    <div class="input-group">
                        <label>Contato do Empresa</label>
                        <input type="text" name="contato" placeholder="Digite seu email" required>
                    </div>
                    <div class="input-group">
                        <label>Categoria do Jogo:</label>
                            <label>Ação:<input type="checkbox" name="genero[]" value="acao"></label><br>
                            <label>Mistério:<input type="checkbox" name="genero[]" value="misterio"></label><br>
                            <label>Terror:<input type="checkbox" name="genero[]" value="terror"></label><br>
                            <label>Rpg:<input type="checkbox" name="genero[]" value="rpg"></label><br>
                            <label>Ficção:<input type="checkbox" name="genero[]" value="ficcao"></label><br>
                            <label>esporte:<input type="checkbox" name="genero[]" value="esporte"></label><br>
                            <label>Fps:<input type="checkbox" name="genero[]" value="fps"></label><br>
                            <label>Luta:<input type="checkbox" name="genero[]" value="luta"></label><br>
                    </div>
                    <button type="submit" class="btn-cadastro">Cadastrar o Jogo</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../ASSETS/JS/index.js"></script>
</body>
</html>
