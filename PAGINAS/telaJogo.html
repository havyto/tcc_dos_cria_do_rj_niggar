<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Gamer - Jogo</title>
<link rel="stylesheet" href="../ASSETS/CSS/jogo.css">
</head>
<body>

<!-- HEADER -->
<header class="header">

    <button id="menu-btn">☰</button>

    <div class="search-box">
        <input type="text" placeholder="Buscar jogos...">
    </div>

    <div class="header-right">
        <button class="cart-btn">🛒</button>

        <div class="logo-container">
            <img src="../ASSETS/IMG/logo.png.png" class="logo-img">
            <span class="logo-text">GHOST GAMER</span>
        </div>
    </div>

</header>

<!-- CONTEÚDO -->
<section class="game-layout">

    <!-- IMAGEM -->
    <div class="game-image"></div>

    <!-- LATERAL COMPRA -->
    <div class="game-buy">
        <button class="buy-btn">COMPRAR</button>
        <button class="wishlist-btn">Lista de desejos</button>

        <p>👨‍💻 Desenvolvedor: Ghost Studio</p>
        <p>💻 Plataforma: PC</p>
    </div>

    <!-- DESCRIÇÃO -->
    <div class="game-description">
        <h3>Descrição</h3>
        <p id="desc-text">
            Um jogo cheio de ação com combates intensos e progressão dinâmica...
        </p>
        <button id="read-more">Ler mais</button>

        <h4>Expansões</h4>
        <p>DLC 1, DLC 2</p>
    </div>

    <!-- IDIOMAS -->
    <div class="game-languages">
        <h3>Idiomas</h3>
        <p>Português, Inglês, Espanhol</p>
    </div>

    <!-- REQUISITOS -->
    <div class="game-requirements">
        <h3>Requisitos</h3>
        <p>Mínimo: 8GB RAM, GTX 750</p>
        <p>Recomendado: 16GB RAM, GTX 1660</p>
    </div>

</section>

<footer>
    <p>© 2026 - Ghost Gamer</p>
</footer>

<script src="../ASSETS/JS/jogo.js"></script>
</body>
</html>
