<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Gamer - Login</title>
    <link rel="stylesheet" href="../ASSETS/CSS/loginCliente.css">
</head>
<body>
    <button id="menu-btn">☰</button>

    <nav id="menu" class="menu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="PAGINAS/biblioteca.html">Biblioteca</a></li>
            <li><a href="PAGINAS/categoria.html">Categoria</a></li>
            <li><a href="PAGINAS/loginCliente.html">Login</a></li>
            <li><a href="PAGINAS/cadastroCliente.html">Cadastro</a></li>
            <li><a href="PAGINAS/perfil.html">Perfil</a></li>
            <li><a href="PAGINAS/suporte.html">Suporte</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="logo-container">
            <img src="../ASSETS/IMG/logo.png.png" alt="Ghost Gamer" class="logo-img">
            <span class="logo-text"><a href="../index.html">GHOST GAMER</a></span>
        </div>

        <!-- Apenas Login Form - Centralizado -->
        <div class="login-wrapper">
            <div class="form-box login-box">
                <h2>LOGIN</h2>
                <form>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="Digite seu email">
                    </div>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" placeholder="Digite sua senha">
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="lembrar">
                        <label for="lembrar">Lembrar-me</label>
                    </div>
                    <button type="submit" class="btn-login">LOGIN</button>
                    <a href="#" class="forgot-password">Esqueci minha senha</a>
                    
                    <div class="cadastro-link">
                        <p>Não tem uma conta? <a href="cadastroCliente.html">Cadastre-se</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../ASSETS/JS/index.js"></script>
</body>
</html>
